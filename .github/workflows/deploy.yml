name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FastAPI image (validation build)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          tags: fastapi-app:ci-test

      - name: Set lowercase repository name
        if: github.ref == 'refs/heads/main'
        run: echo "reponame=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/${{ env.reponame }}/fastapi-app:latest

  deploy:
    needs: build
    # Use "self-hosted" if deploying to your own local machine / VPS runner.
    # Use "ubuntu-latest" + SSH step below if deploying to a remote VPS.
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Stop any conflicting containers
        run: |
          docker rm -f nginx_proxy fastapi_app postgres_db redis_cache 2>/dev/null || true

      - name: Create .env file
        run: |
          cat <<EOF > .env
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          ENVIRONMENT=production
          EOF

      - name: Generate self-signed SSL certificate
        run: |
          mkdir -p certs
          if [ ! -f certs/fullchain.pem ]; then
            openssl req -x509 -nodes -days 365 \
              -newkey rsa:2048 \
              -keyout certs/privkey.pem \
              -out certs/fullchain.pem \
              -subj "/CN=localhost"
          fi

      - name: Deploy with Docker Compose
        run: |
          cd ${{ github.workspace }}
          docker compose pull || true
          docker compose up -d --build
          docker image prune -f

      - name: Verify deployment health
        run: |
          sleep 10
          curl -f http://localhost/health || (echo "Health check failed" && exit 1)
