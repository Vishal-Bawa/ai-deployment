name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build FastAPI image (validation build)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          tags: fastapi-app:ci-test

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/${{ github.repository }}/fastapi-app:latest

  deploy:
    needs: build
    # Use "self-hosted" if deploying to your own local machine / VPS runner.
    # Use "ubuntu-latest" + SSH step below if deploying to a remote VPS.
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          cd ${{ github.workspace }}
          docker compose pull || true
          docker compose up -d --build
          docker image prune -f

      - name: Verify deployment health
        run: |
          sleep 10
          curl -f http://localhost/health || (echo "Health check failed" && exit 1)

  # ---------------------------------------------------------------------
  # ALTERNATE deploy job for a REMOTE VPS instead of a self-hosted runner.
