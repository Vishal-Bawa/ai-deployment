# NGINX reverse proxy for the FastAPI app.
#
# This config supports TWO modes:
#   1. HTTP-only (default, works everywhere, including localhost)
#   2. HTTPS with self-signed or Let's Encrypt certs
#
# See docs/SSL.md for full instructions on both local self-signed certs
# and real Let's Encrypt certs on a VPS with a domain.

# Basic rate limiting to slow down abuse / brute force attempts
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # Redirect to HTTPS in production once you have a real cert + domain.
    # return 301 https://$host$request_uri;

    location /health {
        proxy_pass http://app:8000/health;
        access_log off;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Hide NGINX version banner
    server_tokens off;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /health {
        proxy_pass http://app:8000/health;
        access_log off;
    }

    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    server_tokens off;
}
